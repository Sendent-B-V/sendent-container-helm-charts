replicaCount: 1

image:
  repository: rg.nl-ams.scw.cloud/sendent-public/sendent-outlook
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is "latest"
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Application configuration — these become environment variables in the container.
# See docker-config/.env.example for details on each variable.
config:
  # REQUIRED: The public URL where this add-in will be accessible
  BASE_URL: ""
  # REQUIRED: The Nextcloud server URL
  DEFAULT_NEXTCLOUD_URL: ""
  # Comma-separated feature codes to disable (e.g. "0,1,2")
  FEATURES_CODES_TO_REMOVE: ""
  # Authentication type: naa, naa_silent, or legacy_exchange
  MS_AUTH_TYPE: "legacy_exchange"
  # Azure App ID — required if MS_AUTH_TYPE is naa or naa_silent
  MS_APP_ID: ""
  # Azure Tenant ID — required for non single-tenant apps
  MS_TENANT_ID: ""
  # Proxy placeholder URL
  PROXY_PLACEHOLDER_URL: "https://placeholder.sendent.dev"
  # Auth log levels: none | all | comma-separated (error, debug, warning)
  NAA_AUTH_LOG_LEVELS: "all"

service:
  type: ClusterIP
  port: 4300
  # nodePort: 30430  # Only used when service.type is NodePort

ingress:
  enabled: false
  className: ""
  annotations: {}
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: outlook-addin.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: outlook-addin-tls
  #    hosts:
  #      - outlook-addin.local

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 256Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
