apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sendent-msteams.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "sendent-msteams.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sendent-msteams.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sendent-msteams.name" . }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4200
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "sendent-msteams.fullname" . }}-config
            - secretRef:
                name: {{ include "sendent-msteams.fullname" . }}-secret
          volumeMounts:
            - name: docker-config-volume
              mountPath: /usr/src/app/docker-config
      volumes:
        - name: docker-config-volume
          configMap:
            name: {{ include "sendent-msteams.fullname" . }}-files