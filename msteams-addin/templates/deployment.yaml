apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sendent-msteams.fullname" . }}
  labels:
    {{- include "sendent-msteams.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sendent-msteams.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "sendent-msteams.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
        - name: fetch-latest-certs
          image: alpine:latest
          command: ['sh', '-c']
          args:
            - "wget -q /shared-certs/cacert.pem https://curl.se/ca/cacert.pem"
          volumeMounts:
            - name: shared-ca-certs
              mountPath: /shared-certs

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4200
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "sendent-msteams.fullname" . }}
            - secretRef:
                name: {{ include "sendent-msteams.fullname" . }}-secret
          volumeMounts:
            - name: docker-config
              mountPath: /usr/src/app/docker-config
            - name: tls-cert
              mountPath: /etc/ssl/custom-cert
              readOnly: true
            - name: shared-ca-certs
              mountPath: /etc/ssl/modern-certs
          livenessProbe:
            httpGet:
              path: /manifest.json
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /manifest.json
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: docker-config
          emptyDir: {}
        - name: tls-cert
          secret:
            secretName: werk-plek-tls
            items:
              - key: tls.crt
                path: tls.crt
        - name: shared-ca-certs
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}