replicaCount: 1

image:
  repository: rg.nl-ams.scw.cloud/sendent-public/sendent-msteams
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

config:
  BASE_URL: "https://teams.yourdomain.com"
  MSAPP_TYPE: ""
  MSAPP_ID: "your-app-id"
  MSAPP_TENANT_ID: "your-tenant-id"
  DEFAULT_NEXTCLOUD_URL: "https://nextcloud.yourdomain.com"

secret:
  MSAPP_PASSWORD: "your-secure-password"

service:
  type: ClusterIP
  port: 4200

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: teams.yourdomain.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: msteams-addin-tls
  #    hosts:
  #      - teams.yourdomain.com

resources: {}
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # limits:
  #   cpu: 500m
  #   memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}